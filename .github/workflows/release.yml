name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and publish
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  verify:
    name: Verify (Ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            gnupg

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ubuntu-22.04-${{ runner.arch }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install bundled k6 binary
        run: npm run install:k6

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

  publish-tauri:
    name: Publish (${{ matrix.platform_label }})
    needs: verify
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            platform_label: Linux
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-15-intel
            platform_label: macOS Intel
            args: "--target x86_64-apple-darwin --bundles dmg"
            rust_target: x86_64-apple-darwin
          - platform: macos-15
            platform_label: macOS Apple Silicon
            args: "--target aarch64-apple-darwin --bundles dmg"
            rust_target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${{ github.event.inputs.tag || github.ref_name }}"
          notes_file="docs/releases/${tag_name}.md"
          if [[ ! -f "$notes_file" ]]; then
            notes_file=".github/RELEASE_TEMPLATE.md"
          fi

          {
            echo "tag_name=$tag_name"
            echo "release_name=Load Rift ${tag_name}"
            echo "notes_file=$notes_file"
            echo "release_body<<EOF"
            cat "$notes_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            gnupg

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.rust_target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ runner.arch }}-${{ matrix.rust_target }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install bundled k6 binary
        run: npm run install:k6

      - name: Validate Apple signing secrets
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -n "$APPLE_CERTIFICATE_SECRET" ] || missing+=("APPLE_CERTIFICATE")
          [ -n "$APPLE_CERTIFICATE_PASSWORD_SECRET" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$APPLE_API_ISSUER_SECRET" ] || missing+=("APPLE_API_ISSUER")
          [ -n "$APPLE_API_PRIVATE_KEY_SECRET" ] || missing+=("APPLE_API_KEY")
          [ -n "$APPLE_API_KEY_ID_SECRET" ] || missing+=("APPLE_API_KEY_ID")
          [ -n "$APPLE_TEAM_ID_SECRET" ] || missing+=("APPLE_TEAM_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required macOS signing/notarization secrets are missing: ${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/developer-id-application.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/developer-id-application.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          signing_identity="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'\"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$signing_identity" ]]; then
            echo "Developer ID Application signing identity not found after certificate import." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Sign bundled macOS k6 binary
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          k6_binary="src-tauri/bin/k6-${{ matrix.rust_target }}"
          if [[ ! -f "$k6_binary" ]]; then
            echo "Expected bundled k6 binary not found: $k6_binary" >&2
            exit 1
          fi

          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$k6_binary"
          codesign --verify --verbose=2 "$k6_binary"

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: .
          tagName: ${{ steps.release.outputs.tag_name }}
          releaseName: ${{ steps.release.outputs.release_name }}
          releaseBody: ${{ steps.release.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build signed APT repository
        if: matrix.platform == 'ubuntu-22.04'
        env:
          APT_REPO_SIGNING_PRIVATE_KEY: ${{ secrets.APT_REPO_SIGNING_PRIVATE_KEY }}
          APT_REPO_SIGNING_KEY_FINGERPRINT: ${{ secrets.APT_REPO_SIGNING_KEY_FINGERPRINT }}
          APT_REPO_SIGNING_KEY_PASSPHRASE: ${{ secrets.APT_REPO_SIGNING_KEY_PASSPHRASE }}
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          signing_private_key="$APT_REPO_SIGNING_PRIVATE_KEY"
          signing_fingerprint="$APT_REPO_SIGNING_KEY_FINGERPRINT"
          signing_passphrase="$APT_REPO_SIGNING_KEY_PASSPHRASE"
          signing_source="APT repository signing key"

          if [[ -z "$signing_private_key" && -z "$signing_fingerprint" ]]; then
            signing_private_key="$DEB_SIGNING_PRIVATE_KEY"
            signing_fingerprint="$DEB_SIGNING_KEY_FINGERPRINT"
            signing_passphrase="$DEB_SIGNING_KEY_PASSPHRASE"
            signing_source="Debian package signing key fallback"
          fi

          missing=()
          [[ -n "$signing_private_key" ]] || missing+=("APT_REPO_SIGNING_PRIVATE_KEY or DEB_SIGNING_PRIVATE_KEY")
          [[ -n "$signing_fingerprint" ]] || missing+=("APT_REPO_SIGNING_KEY_FINGERPRINT or DEB_SIGNING_KEY_FINGERPRINT")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Required APT repository signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi
          echo "Using ${signing_source} for APT repository Release signing."

          deb_packages=(src-tauri/target/release/bundle/deb/*.deb)
          if [[ ${#deb_packages[@]} -eq 0 ]]; then
            echo "No Debian packages found under src-tauri/target/release/bundle/deb." >&2
            exit 1
          fi

          gnupg_home="$(mktemp -d)"
          verification_home="$(mktemp -d)"
          key_file="$(mktemp)"
          passphrase_file=""
          setup_extract_dir=""
          cleanup() {
            rm -rf "$gnupg_home" "$verification_home"
            rm -f "$key_file"
            if [[ -n "$passphrase_file" ]]; then
              rm -f "$passphrase_file"
            fi
            if [[ -n "$setup_extract_dir" ]]; then
              rm -rf "$setup_extract_dir"
            fi
          }
          trap cleanup EXIT

          chmod 700 "$gnupg_home" "$verification_home"
          export GNUPGHOME="$gnupg_home"
          echo allow-loopback-pinentry > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --kill gpg-agent || true

          printf '%s' "$signing_private_key" | base64 --decode > "$key_file"
          gpg --batch --import "$key_file"

          expected_fingerprint="$(printf '%s' "$signing_fingerprint" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "$expected_fingerprint" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [[ "$imported_fingerprint" != "$expected_fingerprint" ]]; then
            echo "Imported APT repository signing key fingerprint did not match the selected signing fingerprint." >&2
            exit 1
          fi

          passphrase_args=()
          if [[ -n "$signing_passphrase" ]]; then
            passphrase_file="$(mktemp)"
            chmod 600 "$passphrase_file"
            printf '%s' "$signing_passphrase" > "$passphrase_file"
            passphrase_args=(--gpg-passphrase-file "$passphrase_file")
          else
            echo "Selected APT repository signing passphrase is not set; signing requires an intentionally unprotected key."
          fi

          setup_package="load-rift-repository-setup_1.0_all.deb"
          python3 scripts/build_apt_repository.py \
            --clean \
            --output apt-repository \
            --suite stable \
            --repository-url "https://ddv1982.github.io/load-rift/apt/" \
            --gpg-homedir "$gnupg_home" \
            --gpg-key "$expected_fingerprint" \
            --public-key-out apt-repository/load-rift-archive-keyring.pgp \
            --setup-package-out "$setup_package" \
            "${passphrase_args[@]}" \
            "${deb_packages[@]}"

          test "$(dpkg-deb --field "$setup_package" Package)" = "load-rift-repository-setup"
          test "$(dpkg-deb --field "$setup_package" Version)" = "1.0"
          test "$(dpkg-deb --field "$setup_package" Architecture)" = "all"
          setup_extract_dir="$(mktemp -d)"
          dpkg-deb -x "$setup_package" "$setup_extract_dir"
          test -s "$setup_extract_dir/usr/share/keyrings/load-rift-archive-keyring.pgp"
          grep -Fx "Types: deb" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "URIs: https://ddv1982.github.io/load-rift/apt/" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "Suites: stable" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "Components: main" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -E '^Architectures: .*amd64( |$)' "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "Signed-By: /usr/share/keyrings/load-rift-archive-keyring.pgp" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          sh -n scripts/install-apt-repo.sh

          GNUPGHOME="$verification_home" gpg --batch --import apt-repository/load-rift-archive-keyring.pgp
          GNUPGHOME="$verification_home" gpg --batch --verify apt-repository/dists/stable/InRelease
          GNUPGHOME="$verification_home" gpg --batch --verify \
            apt-repository/dists/stable/Release.gpg \
            apt-repository/dists/stable/Release

          mkdir -p pages-site/apt
          cp -a apt-repository/. pages-site/apt/

      - name: Configure GitHub Pages
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/configure-pages@v5

      - name: Upload APT repository Pages artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-site

      - name: Deploy APT repository to GitHub Pages
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/deploy-pages@v4

      - name: Upload APT setup assets
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            load-rift-repository-setup_1.0_all.deb \
            scripts/install-apt-repo.sh \
            --clobber

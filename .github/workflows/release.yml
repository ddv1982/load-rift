name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and publish
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Ubuntu)
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            gnupg

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          workspaces: src-tauri
          key: ubuntu-22.04-${{ runner.arch }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Rust audit tooling
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Install bundled k6 binary
        run: npm run install:k6

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Workflow smoke
        run: npm run test:workflow-smoke

      - name: Frontend build
        run: npm run build

      - name: Rust fmt
        run: npm run rust:fmt

      - name: Rust clippy
        run: npm run rust:clippy

      - name: Rust audit
        run: npm run rust:audit

      - name: Rust tests
        working-directory: src-tauri
        env:
          LOADRIFT_REQUIRE_BUNDLED_K6_TESTS: "true"
        run: cargo test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

  create-release:
    name: Create Draft Release
    needs: verify
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Resolve release metadata
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${{ github.event.inputs.tag || github.ref_name }}"
          notes_path="docs/releases/${tag_name}.md"
          notes_file="$RUNNER_TEMP/release-notes.md"
          if ! gh api \
            -H "Accept: application/vnd.github.raw" \
            "repos/${{ github.repository }}/contents/${notes_path}?ref=${tag_name}" > "$notes_file"; then
            gh api \
              -H "Accept: application/vnd.github.raw" \
              "repos/${{ github.repository }}/contents/.github/RELEASE_TEMPLATE.md?ref=${tag_name}" > "$notes_file"
          fi

          {
            echo "tag_name=$tag_name"
            echo "notes_file=$notes_file"
          } >> "$GITHUB_OUTPUT"

      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            is_draft="$(gh release view "$TAG_NAME" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release $TAG_NAME is already published; refusing to flip it back to draft." >&2
              echo "Use a new version tag for a replacement release." >&2
              exit 1
            fi
            gh release edit "$TAG_NAME" \
              --repo "${{ github.repository }}" \
              --title "Load Rift $TAG_NAME" \
              --notes-file "$NOTES_FILE" \
              --draft=true \
              --prerelease=false
          else
            gh release create "$TAG_NAME" \
              --repo "${{ github.repository }}" \
              --title "Load Rift $TAG_NAME" \
              --notes-file "$NOTES_FILE" \
              --draft \
              --verify-tag \
              --latest
          fi

  publish-tauri:
    name: Build and Upload (${{ matrix.platform_label }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            platform_label: Linux
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-15-intel
            platform_label: macOS Intel
            args: "--target x86_64-apple-darwin --bundles dmg"
            rust_target: x86_64-apple-darwin
          - platform: macos-15
            platform_label: macOS Apple Silicon
            args: "--target aarch64-apple-darwin --bundles dmg"
            rust_target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            gnupg

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.rust_target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ runner.arch }}-${{ matrix.rust_target }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install bundled k6 binary
        run: npm run install:k6

      - name: Validate Apple signing secrets
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -n "$APPLE_CERTIFICATE_SECRET" ] || missing+=("APPLE_CERTIFICATE")
          [ -n "$APPLE_CERTIFICATE_PASSWORD_SECRET" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$APPLE_API_ISSUER_SECRET" ] || missing+=("APPLE_API_ISSUER")
          [ -n "$APPLE_API_PRIVATE_KEY_SECRET" ] || missing+=("APPLE_API_KEY")
          [ -n "$APPLE_API_KEY_ID_SECRET" ] || missing+=("APPLE_API_KEY_ID")
          [ -n "$APPLE_TEAM_ID_SECRET" ] || missing+=("APPLE_TEAM_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Required macOS signing/notarization secrets are missing: ${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/developer-id-application.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/developer-id-application.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          signing_identity="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'\"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$signing_identity" ]]; then
            echo "Developer ID Application signing identity not found after certificate import." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Sign bundled macOS k6 binary
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          k6_binary="src-tauri/bin/k6-${{ matrix.rust_target }}"
          if [[ ! -f "$k6_binary" ]]; then
            echo "Expected bundled k6 binary not found: $k6_binary" >&2
            exit 1
          fi

          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$k6_binary"
          codesign --verify --verbose=2 "$k6_binary"

      - name: Build Tauri bundles
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          npm run tauri -- build ${{ matrix.args }}

      - name: Clean up Apple signing environment
        if: always() && startsWith(matrix.platform, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/developer-id-application.p12"
          if [[ -n "${APPLE_API_KEY_PATH:-}" ]]; then
            rm -f "$APPLE_API_KEY_PATH"
          fi

      - name: Upload Linux desktop artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-release-assets-${{ matrix.rust_target }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload macOS desktop artifact
        if: startsWith(matrix.platform, 'macos-')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-release-assets-${{ matrix.rust_target }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Build signed APT repository
        if: matrix.platform == 'ubuntu-22.04'
        env:
          APT_REPO_SIGNING_PRIVATE_KEY: ${{ secrets.APT_REPO_SIGNING_PRIVATE_KEY }}
          APT_REPO_SIGNING_KEY_FINGERPRINT: ${{ secrets.APT_REPO_SIGNING_KEY_FINGERPRINT }}
          APT_REPO_SIGNING_KEY_PASSPHRASE: ${{ secrets.APT_REPO_SIGNING_KEY_PASSPHRASE }}
          DEB_SIGNING_PRIVATE_KEY: ${{ secrets.DEB_SIGNING_PRIVATE_KEY }}
          DEB_SIGNING_KEY_FINGERPRINT: ${{ secrets.DEB_SIGNING_KEY_FINGERPRINT }}
          DEB_SIGNING_KEY_PASSPHRASE: ${{ secrets.DEB_SIGNING_KEY_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          signing_private_key="$APT_REPO_SIGNING_PRIVATE_KEY"
          signing_fingerprint="$APT_REPO_SIGNING_KEY_FINGERPRINT"
          signing_passphrase="$APT_REPO_SIGNING_KEY_PASSPHRASE"
          signing_source="APT repository signing key"

          if [[ -z "$signing_private_key" && -z "$signing_fingerprint" ]]; then
            signing_private_key="$DEB_SIGNING_PRIVATE_KEY"
            signing_fingerprint="$DEB_SIGNING_KEY_FINGERPRINT"
            signing_passphrase="$DEB_SIGNING_KEY_PASSPHRASE"
            signing_source="Debian package signing key fallback"
          fi

          missing=()
          [[ -n "$signing_private_key" ]] || missing+=("APT_REPO_SIGNING_PRIVATE_KEY or DEB_SIGNING_PRIVATE_KEY")
          [[ -n "$signing_fingerprint" ]] || missing+=("APT_REPO_SIGNING_KEY_FINGERPRINT or DEB_SIGNING_KEY_FINGERPRINT")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Required APT repository signing inputs are missing: ${missing[*]}" >&2
            exit 1
          fi
          echo "Using ${signing_source} for APT repository Release signing."

          deb_packages=(src-tauri/target/release/bundle/deb/*.deb)
          if [[ ${#deb_packages[@]} -eq 0 ]]; then
            echo "No Debian packages found under src-tauri/target/release/bundle/deb." >&2
            exit 1
          fi

          gnupg_home="$(mktemp -d)"
          verification_home="$(mktemp -d)"
          key_file="$(mktemp)"
          passphrase_file=""
          setup_extract_dir=""
          setup_signature_status=""
          cleanup() {
            rm -rf "$gnupg_home" "$verification_home"
            rm -f "$key_file"
            if [[ -n "$passphrase_file" ]]; then
              rm -f "$passphrase_file"
            fi
            if [[ -n "$setup_extract_dir" ]]; then
              rm -rf "$setup_extract_dir"
            fi
            if [[ -n "$setup_signature_status" ]]; then
              rm -f "$setup_signature_status"
            fi
          }
          trap cleanup EXIT

          chmod 700 "$gnupg_home" "$verification_home"
          export GNUPGHOME="$gnupg_home"
          echo allow-loopback-pinentry > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --kill gpg-agent || true

          printf '%s' "$signing_private_key" | base64 --decode > "$key_file"
          gpg --batch --import "$key_file"

          expected_fingerprint="$(printf '%s' "$signing_fingerprint" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "$expected_fingerprint" | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          if [[ "$imported_fingerprint" != "$expected_fingerprint" ]]; then
            echo "Imported APT repository signing key fingerprint did not match the selected signing fingerprint." >&2
            exit 1
          fi

          passphrase_args=()
          if [[ -n "$signing_passphrase" ]]; then
            passphrase_file="$(mktemp)"
            chmod 600 "$passphrase_file"
            printf '%s' "$signing_passphrase" > "$passphrase_file"
            passphrase_args=(--gpg-passphrase-file "$passphrase_file")
          else
            echo "Selected APT repository signing passphrase is not set; signing requires an intentionally unprotected key."
          fi

          setup_package="load-rift-repository-setup_1.0_all.deb"
          setup_package_sha256="${setup_package}.sha256"
          setup_package_sha256_signature="${setup_package_sha256}.asc"
          setup_installer="install-apt-repo.sh"
          python3 scripts/build_apt_repository.py \
            --clean \
            --output apt-repository \
            --suite stable \
            --repository-url "https://ddv1982.github.io/load-rift/apt/" \
            --gpg-homedir "$gnupg_home" \
            --gpg-key "$expected_fingerprint" \
            --public-key-out apt-repository/load-rift-archive-keyring.pgp \
            --setup-package-out "$setup_package" \
            "${passphrase_args[@]}" \
            "${deb_packages[@]}"

          test "$(dpkg-deb --field "$setup_package" Package)" = "load-rift-repository-setup"
          test "$(dpkg-deb --field "$setup_package" Version)" = "1.0"
          test "$(dpkg-deb --field "$setup_package" Architecture)" = "all"
          setup_extract_dir="$(mktemp -d)"
          dpkg-deb -x "$setup_package" "$setup_extract_dir"
          test -s "$setup_extract_dir/usr/share/keyrings/load-rift-archive-keyring.pgp"
          grep -Fx "Types: deb" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "URIs: https://ddv1982.github.io/load-rift/apt/" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "Suites: stable" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "Components: main" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -E '^Architectures: .*amd64( |$)' "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          grep -Fx "Signed-By: /usr/share/keyrings/load-rift-archive-keyring.pgp" "$setup_extract_dir/etc/apt/sources.list.d/load-rift.sources"
          sha256sum "$setup_package" > "$setup_package_sha256"
          sha256sum -c "$setup_package_sha256"
          gpg_sign_args=(
            --batch
            --yes
            --pinentry-mode loopback
            --armor
            --detach-sign
            --local-user "$expected_fingerprint"
            --output "$setup_package_sha256_signature"
          )
          if [[ -n "$signing_passphrase" ]]; then
            gpg_sign_args+=(--passphrase-file "$passphrase_file")
          fi
          gpg "${gpg_sign_args[@]}" "$setup_package_sha256"
          setup_signature_status="$(mktemp)"
          gpg --batch --status-fd 3 --verify "$setup_package_sha256_signature" "$setup_package_sha256" 3>"$setup_signature_status"
          setup_validsig_fingerprints="$(awk '$1 == "[GNUPG:]" && $2 == "VALIDSIG" { gsub(/[[:space:]]/, "", $3); print toupper($3) }' "$setup_signature_status")"
          setup_validsig_count="$(printf '%s\n' "$setup_validsig_fingerprints" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
          if [[ "$setup_validsig_count" != "1" ]]; then
            echo "Expected exactly one VALIDSIG signer for the APT setup SHA256 signature; found ${setup_validsig_count}." >&2
            exit 1
          fi
          setup_signer_fingerprint="$setup_validsig_fingerprints"
          sed "s/__LOAD_RIFT_APT_SIGNING_KEY_FINGERPRINT__/$setup_signer_fingerprint/g" \
            scripts/install-apt-repo.sh > "$setup_installer"
          ! grep -q __LOAD_RIFT_APT_SIGNING_KEY_FINGERPRINT__ "$setup_installer"
          ! grep -q LOAD_RIFT_ALLOW_UNVERIFIED_REPOSITORY_SETUP "$setup_installer"
          grep -F "$setup_signer_fingerprint" "$setup_installer"
          sh -n "$setup_installer"

          installer_keyring_validation="$(GNUPGHOME="$verification_home" gpg --batch --import-options show-only --with-colons --import apt-repository/load-rift-archive-keyring.pgp | awk -F: -v expected="$setup_signer_fingerprint" '
            function finish_primary_key() {
              if (!seen_primary_key) {
                return
              }
              primary_key_count++
              if (primary_key_has_expected_signer) {
                accepted_primary_key_count++
              } else {
                unexpected_primary_key_fingerprint = primary_key_fingerprint
              }
              primary_key_has_expected_signer = 0
              primary_key_fingerprint = ""
            }
            $1 == "pub" {
              finish_primary_key()
              seen_primary_key = 1
              next
            }
            $1 == "fpr" && seen_primary_key {
              fingerprint = toupper($10)
              gsub(/[[:space:]]/, "", fingerprint)
              if (primary_key_fingerprint == "") {
                primary_key_fingerprint = fingerprint
              }
              if (fingerprint == expected) {
                primary_key_has_expected_signer = 1
              }
            }
            END {
              finish_primary_key()
              if (primary_key_count == 0) {
                print "NO_PRIMARY_KEY"
              } else if (accepted_primary_key_count == 0) {
                print "MISSING_PINNED_SIGNER"
              } else if (unexpected_primary_key_fingerprint != "") {
                print "UNEXPECTED_PRIMARY_KEY " unexpected_primary_key_fingerprint
              } else if (accepted_primary_key_count > 1) {
                print "MULTIPLE_ACCEPTED_PRIMARY_KEYS"
              } else {
                print "OK"
              }
            }
          ')"
          if [[ "$installer_keyring_validation" != "OK" ]]; then
            echo "Generated APT keyring failed installer-equivalent validation: ${installer_keyring_validation}" >&2
            exit 1
          fi
          GNUPGHOME="$verification_home" gpg --batch --import apt-repository/load-rift-archive-keyring.pgp
          GNUPGHOME="$verification_home" gpg --batch --status-fd 3 --verify "$setup_package_sha256_signature" "$setup_package_sha256" 3>"$setup_signature_status"
          installer_validsig_fingerprints="$(awk '$1 == "[GNUPG:]" && $2 == "VALIDSIG" { gsub(/[[:space:]]/, "", $3); print toupper($3) }' "$setup_signature_status")"
          if [[ "$installer_validsig_fingerprints" != "$setup_signer_fingerprint" ]]; then
            echo "Generated APT setup signature VALIDSIG did not match rendered installer pin." >&2
            echo "Expected: $setup_signer_fingerprint" >&2
            echo "Actual:   $installer_validsig_fingerprints" >&2
            exit 1
          fi
          sha256sum -c "$setup_package_sha256"

          GNUPGHOME="$verification_home" gpg --batch --verify apt-repository/dists/stable/InRelease
          GNUPGHOME="$verification_home" gpg --batch --verify \
            apt-repository/dists/stable/Release.gpg \
            apt-repository/dists/stable/Release

          mkdir -p pages-site/apt
          cp -a apt-repository/. pages-site/apt/

      - name: Upload APT setup release assets artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apt-release-assets
          path: |
            load-rift-repository-setup_1.0_all.deb
            load-rift-repository-setup_1.0_all.deb.sha256
            load-rift-repository-setup_1.0_all.deb.sha256.asc
            install-apt-repo.sh
          if-no-files-found: error

      - name: Upload APT repository site artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apt-pages-site
          path: pages-site
          if-no-files-found: error

  publish-release-assets:
    name: Publish Release Assets
    needs: [create-release, publish-tauri]
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release asset artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name desktop-release-assets-x86_64-unknown-linux-gnu \
            --dir release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name desktop-release-assets-x86_64-apple-darwin \
            --dir release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name desktop-release-assets-aarch64-apple-darwin \
            --dir release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name apt-release-assets \
            --dir release-assets

      - name: Upload GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find release-assets -type f -print0)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets were downloaded from build artifacts." >&2
            exit 1
          fi

          gh release upload "$TAG_NAME" "${assets[@]}" \
            --repo "${{ github.repository }}" \
            --clobber

          for asset_name in \
            install-apt-repo.sh \
            load-rift-repository-setup_1.0_all.deb \
            load-rift-repository-setup_1.0_all.deb.sha256 \
            load-rift-repository-setup_1.0_all.deb.sha256.asc; do
            gh release view "$TAG_NAME" \
              --repo "${{ github.repository }}" \
              --json assets \
              --jq '.assets[].name' \
              | grep -Fx "$asset_name"
          done

  deploy-apt-pages:
    name: Deploy APT repository pages
    needs: publish-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Download APT repository site artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: apt-pages-site
          path: pages-site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      - name: Upload APT repository Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: pages-site

      - name: Deploy APT repository to GitHub Pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  publish-release:
    name: Publish Release
    needs: [create-release, publish-release-assets, deploy-apt-pages]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release edit "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease=false

name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06-30)
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          workspaces: src-tauri
          key: ubuntu-22.04-${{ runner.arch }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Rust audit tooling
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Install bundled k6 binary
        run: npm run install:k6

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Workflow smoke
        run: npm run test:workflow-smoke

      - name: Frontend build
        run: npm run build

      - name: Rust fmt
        run: npm run rust:fmt

      - name: Rust clippy
        run: npm run rust:clippy

      - name: Rust audit
        run: npm run rust:audit

      - name: Rust tests
        working-directory: src-tauri
        env:
          LOADRIFT_REQUIRE_BUNDLED_K6_TESTS: "true"
        run: cargo test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check
